# Canton shared-secret mode: 4 party tenants for Treasury Sandbox
application:
  tenants:
    AppProvider:
      tenantId: AppProvider
      partyId: ${APP_PROVIDER_PARTY}
      internal: true
      users:
        - operator
    Member1:
      tenantId: Member1
      partyId: ${MEMBER1_PARTY}
      internal: false
      users:
        - member1
    Member2:
      tenantId: Member2
      partyId: ${MEMBER2_PARTY}
      internal: false
      users:
        - member2
    PublicObserver:
      tenantId: PublicObserver
      partyId: ${PUBLIC_OBSERVER_PARTY}
      internal: false
      users:
        - observer

security.token: "${APP_PROVIDER_BACKEND_USER_TOKEN}"
